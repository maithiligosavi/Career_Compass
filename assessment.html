    />

      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(
            rgba(245, 245, 220, 0.9),
            rgba(245, 245, 220, 0.9)
          ),
          url("https://images.unsplash.com/photo-1521737711867-e3b97375f902?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        color: #4a3728;
      }

      .assessment-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        min-height: calc(100vh - 100px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .assessment-container h1 {
        text-align: center;
        font-size: 3rem;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #4a3728;
        text-shadow: 2px 2px 4px rgba(74, 55, 40, 0.2);
      }

      .assessment-container > p {
        text-align: center;
        font-size: 1.4rem;
        margin-bottom: 3rem;
        color: #6b4f3c;
      }

      .field-buttons {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin: 40px 0;
      }

      .field-btn {
        padding: 20px 40px;
        font-size: 1.4rem;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.4s ease;
        background: #8b7355;
        color: #fff8dc;
        font-weight: 600;
        letter-spacing: 1px;
        min-width: 200px;
        border: 2px solid #6b4f3c;
      }

      .field-btn:hover {
        transform: translateY(-5px);
        background: #6b4f3c;
        box-shadow: 0 15px 30px rgba(107, 79, 60, 0.3);
      }

      .quiz-container {
        display: none;
        background: linear-gradient(135deg, #fff8dc, #f5deb3);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 30px rgba(107, 79, 60, 0.2);
        width: 90%;
        max-width: 800px;
        margin: 0 auto;
        border: 2px solid #8b7355;
      }

      .question {
        margin-bottom: 30px;
        color: #4a3728;
        background: #faebd7;
        padding: 25px;
        border-radius: 15px;
        border-left: 5px solid #8b7355;
      }

      .question h3 {
        color: #4a3728;
        font-size: 1.3rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid #deb887;
        padding-bottom: 10px;
      }

      .question p {
        color: #6b4f3c;
        font-size: 1.2rem;
        line-height: 1.6;
      }

      .options {
        display: grid;
        gap: 15px;
      }

      .option-btn {
        padding: 15px 20px;
        border: 2px solid #8b7355;
        border-radius: 12px;
        background: #fff8dc;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1.1rem;
        color: #4a3728;
        font-weight: 500;
      }

      .option-btn:hover {
        background: #8b7355;
        color: #fff8dc;
        transform: translateX(5px);
      }

      .result-container {
        display: none;
        text-align: center;
        margin: 30px auto;
        padding: 30px;
        background: linear-gradient(135deg, #fff8dc, #f5deb3);
        border-radius: 20px;
        box-shadow: 0 15px 30px rgba(107, 79, 60, 0.2);
        width: 90%;
        max-width: 800px;
        color: #4a3728;
        border: 2px solid #8b7355;
      }

      .result-container h2 {
        color: #4a3728;
        font-size: 2rem;
        margin-bottom: 1.5rem;
        border-bottom: 2px solid #deb887;
        padding-bottom: 15px;
      }

      .career-match h3 {
        color: #6b4f3c;
        font-size: 1.8rem;
        margin-bottom: 1rem;
      }

      .career-match p {
        color: #4a3728;
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .roadmap {
        margin-top: 30px;
        padding: 30px;
        background: #faebd7;
        border-radius: 15px;
        text-align: left;
        border-left: 5px solid #8b7355;
      }

      .roadmap h3 {
        color: #4a3728;
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        text-align: center;
        border-bottom: 2px solid #deb887;
        padding-bottom: 10px;
      }

      .roadmap ul {
        list-style-type: none;
        padding: 0;
      }

      .roadmap li {
        color: #6b4f3c;
        font-size: 1.1rem;
        padding: 15px;
        margin-bottom: 10px;
        background: #fff8dc;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(107, 79, 60, 0.1);
        transition: transform 0.3s ease;
        border-left: 3px solid #8b7355;
      }

      .roadmap li:hover {
        transform: translateX(10px);
        background: #f5deb3;
      }

      /* Progress bar styles */
      .progress-bar {
        width: 100%;
        height: 10px;
        background: #deb887;
        border-radius: 5px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .progress {
        height: 100%;
        background: #8b7355;
        transition: width 0.3s ease;
      }

      /* Animation for options */
      .option-btn {
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (max-width: 768px) {
        .assessment-container {
          padding: 15px;
        }

        .assessment-container h1 {
          font-size: 2rem;
        }

        .field-buttons {
          flex-direction: column;
          align-items: center;
          gap: 15px;
        }

        .field-btn {
          width: 100%;
          max-width: 300px;
          padding: 15px 30px;
          font-size: 1.2rem;
        }

        .question h3 {
          font-size: 1.1rem;
        }

        .question p {
          font-size: 1rem;
        }

        .option-btn {
          padding: 12px 15px;
          font-size: 1rem;
        }

        .result-container h2 {
          font-size: 1.5rem;
        }

        .career-match h3 {
          font-size: 1.3rem;
        }

        .roadmap li {
          font-size: 1rem;
          padding: 12px;
        }
      }
    </style>
  </head>

      let currentField = "";
      let currentQuestion = 0;
      let answers = [];

      function startQuiz(field) {
        currentField = field;
        currentQuestion = 0;
        answers = [];
        document.getElementById("quiz-container").style.display = "block";
        document.getElementById("result-container").style.display = "none";
        document.getElementById("field-title").textContent = `${
          field.charAt(0).toUpperCase() + field.slice(1)
        } Assessment`;
        showQuestion();
      }

      function showQuestion() {
        const questionData = quizData[currentField].questions[currentQuestion];
        const questionContainer = document.getElementById("question-container");
        const optionsContainer = document.getElementById("options-container");

        questionContainer.innerHTML = `
          <h3>Question ${currentQuestion + 1} of ${
          quizData[currentField].questions.length
        }</h3>
          <p>${questionData.question}</p>
        `;

        optionsContainer.innerHTML = questionData.options
          .map(
            (option, index) => `
          <button class="option-btn" onclick="selectAnswer(${index})">${option}</button>
        `
          )
          .join("");
      }

      function selectAnswer(answerIndex) {
        answers.push(answerIndex);
        if (currentQuestion < quizData[currentField].questions.length - 1) {
          currentQuestion++;
          showQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        const score = calculateScore();
        const resultContainer = document.getElementById("result-container");
        const careerMatch = document.getElementById("career-match");
        const roadmap = document.getElementById("roadmap");

        document.getElementById("quiz-container").style.display = "none";
        resultContainer.style.display = "block";

        const career = determineCareer(score);
        careerMatch.innerHTML = `
          <h3>${career.title}</h3>
          <p>${career.description}</p>
        `;

        roadmap.innerHTML = `
          <h3>Your Career Roadmap:</h3>
          <ul>
            ${career.roadmap.map((step) => `<li>${step}</li>`).join("")}
          </ul>
        `;
      }

      function calculateScore() {
        return (
          answers.reduce((total, answer) => total + answer, 0) / answers.length
        );
      }

      function determineCareer(score) {
        const careers = quizData[currentField].careers;
        return score < 2
          ? Object.values(careers)[0]
          : Object.values(careers)[1];
      }
